<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #mensagem { text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Entrar</h2>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <button onclick="logar()" id="btnEntrar">Login</button>
    <div id="mensagem"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIPDqYfB973GTOCtu4feFIFlN1rXuFRTlri31h6j4TJwzrOuEYX4OvUtKzsBvwiD3z/exec";

    function logar() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('btnEntrar');
        const msg = document.getElementById('mensagem');

        if(!user || !pass) {
            alert("Preencha todos os campos!");
            return;
        }

        btn.disabled = true;
        msg.innerText = "Verificando...";
        msg.style.color = "black";

        // Monta a URL com os parâmetros
        const finalUrl = `${SCRIPT_URL}?user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`;

        fetch(finalUrl)
            .then(res => res.text())
            .then(status => {
                // Remove espaços extras do retorno do Google
                const resultado = status.trim();

                if (resultado === "ACESSO_PERMITIDO") {
                    msg.innerText = "Login realizado!";
                    msg.style.color = "green";
                    // Redirecione aqui: window.location.href = "home.html";
                } else {
                    msg.innerText = "Usuário ou senha incorretos.";
                    msg.style.color = "red";
                    btn.disabled = false;
                }
            })
            .catch(err => {
                console.error(err);
                msg.innerText = "Erro ao conectar ao servidor.";
                btn.disabled = false;
            });
    }
</script>

</body>
</html>
