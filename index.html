<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #mensagem { text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Entrar</h2>
    <input type="text" id="user" placeholder="Usuário">
    <input type="password" id="pass" placeholder="Senha">
    <button onclick="logar()" id="btnEntrar">Login</button>
    <div id="mensagem"></div>
</div>


<script>
  const URL_PLANILHA = "https://script.google.com/macros/s/AKfycbxCm-iiJYTR4UWkiQlqKCsRf7R2j8BpKeQWdpe5n8VutA8CFlIlkpwSUr3JIK-pewU0/exec"; // Coloque a URL do "exec" aqui

  async function logar() {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;

    try {
      // Monta a URL e faz a chamada
      const response = await fetch(`${URL_PLANILHA}?user=${user}&pass=${pass}`);
      const dados = await response.json();

      if (dados.result === "ACESSO_PERMITIDO") {
        alert("Login Sucesso!");
        // window.location.href = "sucesso.html";
      } else {
        alert("Usuário ou senha incorretos.");
      }
    } catch (erro) {
      console.error("Erro na conexão:", erro);
      alert("Erro ao conectar com a planilha. Verifique se ela está pública.");
    }
  }
</script>


</body>
</html>
