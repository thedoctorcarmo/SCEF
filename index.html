<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Estoque | Login</title>
    <!-- Bootstrap 5.3 e Google Fonts -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-5px);
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: 700;
            color: #4e54c8;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .form-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-control {
            border-radius: 10px;
            padding: 0.75rem 1rem;
            border: 2px solid #edf2f7;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: none;
        }
        .btn-login {
            background: #4e54c8;
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            font-weight: 600;
            font-size: 1rem;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: #3b41a8;
            box-shadow: 0 5px 15px rgba(78, 84, 200, 0.4);
        }
        #mensagemErro {
            background: #fff5f5;
            color: #c53030;
            padding: 0.75rem;
            border-radius: 10px;
            font-size: 0.85rem;
            display: none;
            margin-bottom: 1rem;
            border: 1px solid #feb2b2;
        }
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo text-center">📦 EstoquePro</div>
    <p class="text-center text-muted mb-4 small">Bem-vindo! Identifique-se para acessar.</p>

    <div id="mensagemErro"></div>

    <div class="mb-3">
        <label class="form-label">Usuário</label>
        <input type="text" id="usuario" class="form-control" placeholder="Seu usuário">
    </div>

    <div class="mb-4">
        <label class="form-label">Senha</label>
        <input type="password" id="senha" class="form-control" placeholder="••••••••">
    </div>

    <button onclick="validarLogin()" id="btnAcessar" class="btn btn-primary w-100 btn-login">
        <span id="spinner" class="loader" style="display: none;"></span>
        ACESSAR SISTEMA
    </button>
</div>

<script>
    async function validarLogin() {
        const u = document.getElementById('usuario').value;
        const s = document.getElementById('senha').value;
        const msg = document.getElementById('mensagemErro');
        const btn = document.getElementById('btnAcessar');
        const spinner = document.getElementById('spinner');

        if (!u || !s) {
            msg.innerText = "⚠️ Preencha todos os campos!";
            msg.style.display = "block";
            return;
        }

        // Configuração visual do carregamento
        btn.disabled = true;
        spinner.style.display = "inline-block";
        msg.style.display = "none";

        // SUA URL ATUALIZADA
        const G_SCRIPT = "https://script.google.com/macros/s/AKfycbyPnSQzNO9T3eRdxdTP78idos1qt1OJszLJEf383481sBCagR2vZpWRDJj-q4ZEwsyM/exec";
        
        try {
            const response = await fetch(`${G_SCRIPT}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(s)}`);
            const resultado = await response.text();

            if (resultado.trim().includes("ACESSO_PERMITIDO")) {
                // SUCESSO!
                document.body.innerHTML = `
                    <div class="login-card text-center animate__animated animate__fadeIn">
                        <h2 class="text-success fw-bold">🔓 Acesso Liberado</h2>
                        <p class="text-muted mt-3">Bem-vindo, <b>${u}</b>!</p>
                        <hr>
                        <p>Redirecionando para o painel de estoque...</p>
                    </div>`;
            } else {
                msg.innerText = "❌ Usuário ou senha incorretos.";
                msg.style.display = "block";
                document.getElementById('senha').value = "";
            }
        } catch (error) {
            msg.innerText = "🚨 Erro de conexão com o servidor.";
            msg.style.display = "block";
        } finally {
            btn.disabled = false;
            spinner.style.display = "none";
        }
    }
</script>

</body>
</html>
